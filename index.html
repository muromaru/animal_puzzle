<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whose foot</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

h1 { margin: 6px 0 0; }
h2 { margin: 0 0 10px; font-weight: normal; }

#top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 300px;
  margin: 0 auto 20px;
}

#scoreBox {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #222;
  color: white;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 600;
}

#scoreBox span {
  font-size: 22px;
  margin: 2px 0 0 0;
}

#medalBox {
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}

/* ===== 動物一覧 ===== */
#animalBar {
  margin: 10px auto 6px;
  font-size: 18px;
  cursor: pointer;
}

/* ===== 山札 ===== */
#deckWrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#deck {
  font-size: 44px;
  line-height: 1;
  display: inline-block;
}
#count {
  position: absolute;
  bottom: -6px;
  right: -10px;
  background: #ff5722;
  color: white;
  font-size: 12px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 10px;
}

#board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 300px;
  margin: 10px auto 6px;
}

.cell {
  background: white;
  border: 2px solid #333;
  height: 80px;
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .25s ease, opacity .25s ease, background .4s ease;
}
.cell.hit { background: #fff176; }
.cell.remove { transform: scale(0.2); opacity: 0; }

/* ===== 残数表示 ===== */
#cardDetail {
  width: 180px;
  margin: 6px auto 10px;
  font-size: 13px;
}

.cardRow {
  display: flex;
  justify-content: space-between;
  background: white;
  border-radius: 8px;
  padding: 4px 8px;
  margin-bottom: 4px;
  border: 1px solid #ccc;
}

.cardItem {
  transition: opacity .3s;
}
.cardItem.zero {
  opacity: 0.3;
}

/* ===== Ring ===== */
.ring {
  position: fixed;
  width: 40px;
  height: 40px;
  border: 5px solid #ff9800;
  border-radius: 50%;
  animation: ring 0.4s ease-out forwards;
  pointer-events: none;
  z-index: 1000;
}
@keyframes ring {
  from { transform: scale(.3); opacity: 1; }
  to { transform: scale(4); opacity: 0; }
}

/* ===== Popup ===== */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
#popup {
  background: white;
  padding: 24px 32px;
  border-radius: 14px;
  width: 260px;
  position: relative;
}
#popup  .popupMainBtn {
  width: 100%;
  padding: 14px 0;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  background: #ff9800;
  color: white;
  margin-top: 12px;
}

#popupClose {
  position: absolute;
  top: -10px;
  right: -10px;

  width: 32px;
  height: 32px;
  border-radius: 50%;

  background: #000;
  color: #fff;

  border: none;
  font-size: 18px;
  font-weight: bold;
  line-height: 32px;
  text-align: center;

  cursor: pointer;
  padding: 0;
}

#popupClose:hover {
  opacity: 0.8;
}

.popupBtnRow {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.btnMain, .btnSub {
  flex: 1;
  padding: 14px 0;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}

.btnMain {
  background: orange;
  color: white;
  font-weight: bold;
}

.btnSub {
  background: #eee;
  color: #333;
}

/* ===== ダブルアップ選択（上下並び専用） ===== */
.doubleUpChoice {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 20px;
}

.doubleUpChoice .btnMain,
.doubleUpChoice .btnSub {
  width: 100%;
  padding: 16px 0;
  font-size: 18px;
  border-radius: 12px;
  white-space: nowrap; /* 改行防止 */
}

.duCard {
  cursor: pointer;
  padding: 12px;
  border-radius: 10px;
  transition: transform .15s ease, background .15s ease;
}
.duCard:hover {
  transform: scale(1.1);
}
.duCard:active {
transform: scale(0.9);
}
.duCard.selected {
background: #ffe0b2;
}

/* ===== 動物選択 ===== */
.animalGrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  font-size: 30px;
  margin-top: 10px;
}
.animalBtn {
  cursor: pointer;
  opacity: 0.3;
}
.animalBtn.active {
  opacity: 1;
}

#restart {
  margin-top: 10px;
  padding: 10px 24px;
  font-size: 16px;
}

#history {
  margin-top: 15px;
  font-size: 14px;
}

#autoBtn {
  margin: 10px auto;
  padding: 12px 24px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 24px;
  border: none;
  cursor: pointer;

  background: #ccc;
  color: #333;

  transition: background .2s ease, color .2s ease, transform .1s ease;
}

#autoBtn.on {
  background: #ff9800;
  color: #fff;
}

#autoBtn:active {
  transform: scale(0.95);
}

.evalCell {
  background: rgba(255, 0, 0, 0.07) !important;
  position: relative;
}

.evalPercent {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
  color: #b00000;
  pointer-events: none;
}

#autoSpeed {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
}

#autoSpeed button {
  padding: 6px 12px;
  border-radius: 14px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  background: #eee;
}

#autoSpeed button.active {
  background: #ff9800;
  color: white;
  font-weight: bold;
}

</style>
</head>

<body>

<h1>だれのあし？</h1>
<h2>Whose foot</h2>

<div id="top">
  <div id="scoreBox">Score <span id="score">0</span></div>
  <div id="deckWrap">
    <div id="deck"></div>
    <div id="count"></div>
  </div>
  <div id="medalBox" style="
  background:#222;
  color:#fff;
  padding:6px 14px;
  border-radius:20px;
  font-size:16px;
  font-weight:600;"
  onclick="openMedalSelectPopup()">
  🪙 <span id="totalMedals">0</span>
  </div>
</div>

<div id="animalBar" onclick="openAnimalPopup()"></div>

<div id="board"></div>
<div id="cardDetail"></div>

<button id="restart" onclick="restartGame()">Restart</button>

<button id="autoBtn" onclick="toggleAuto()">
  🤖 AUTO : OFF
</button>

<div id="autoSpeed">
  <button onclick="setAutoSpeed('fast')">FAST</button>
  <button onclick="setAutoSpeed('medium')">MEDIUM</button>
  <button onclick="setAutoSpeed('slow')">SLOW</button>
</div>

<div id="history">
  <strong>スコア履歴</strong>
  <ul id="log"></ul>
</div>

<div id="overlay">
  <div id="popup">
    <button id="popupClose">×</button>
    <h3 id="popupTitle"></h3>
    <div id="popupBody"></div>
    <button id="popupOk" class="popupMainBtn">OK</button>
  </div>
</div>


<script>
const allAnimals = ["🐱","🐶","🐒","🐦","🐸","🐴","🐷"];
let animals = ["🐱","🐶","🐒","🐦","🐸"];

let deck, board, currentCard, score;
let gameMedals = 0;
let totalMedals = 0;
let isDoubleUpPlaying = false;
let historyCount = 0;
let scoredLines = new Set();
let gameEnded = false;
let firstPlay = true
let doubleUpWinRate = 2 / 3;
let autoPlayEnabled = false;
let autoEvalRaw = Array(9).fill(null);
let autoSpeed = "medium";
const AUTO_SPEED_MS = {
  fast: 200,
  medium: 1000,
  slow: 2000
};


const boardDiv = document.getElementById("board");

const popupOk = document.getElementById("popupOk");

const popupClose = document.getElementById("popupClose");

function init() {
    if (!firstPlay) {
         if (totalMedals <= 0) {
            alert("メダルが足りません");
            return;
         }
         totalMedals--;
    }
    firstPlay = false;
    document.getElementById("totalMedals").innerText = totalMedals;
  deck = [];
  animals.forEach(a => {
    for (let i = 0; i < 4; i++) {
      deck.push({ animal: a, type: "BODY" });
      deck.push({ animal: a, type: "FOOT" });
    }
  });
  for (let i = 0; i < 4; i++) deck.push({ animal: "🃏", type: "JOKER" });

  deck.sort(() => Math.random() - 0.5);
  board = Array(9).fill(null);
  score = 0;
  scoredLines.clear();
  gameEnded = false;

  document.getElementById("score").innerText = score;
  updateAnimalBar();
  renderBoard();
  draw();
}

function openMedalSelectPopup() {
  const body = document.getElementById("popupBody");

  document.getElementById("popupTitle").innerText = "総メダル数を変更";

  body.innerHTML = `
    <select id="medalSelect" style="width:100%;padding:10px;font-size:18px;">
      ${[0,1,2,3,5,10,20,30,50,99].map(n =>
        `<option value="${n}" ${n===totalMedals ? "selected":""}>${n}</option>`
      ).join("")}
    </select>
  `;

  showPopupOk( () => {
    const v = parseInt(document.getElementById("medalSelect").value, 10);
    totalMedals = v;
    document.getElementById("totalMedals").innerText = totalMedals;
    document.getElementById("overlay").style.display = "none";
  });
popupOk.innerText = "OK";
popupClose.style.display = "block";
popupClose.onclick = closePopupOnly

document.getElementById("overlay").style.display = "flex";
}

function updateAnimalBar() {
  document.getElementById("animalBar").innerText =
    "動物一覧：" + animals.join(" ");
}

function openAnimalPopup() {
  document.getElementById("popupTitle").innerText = "動物の種類を選択";
  const body = document.getElementById("popupBody");
  body.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "animalGrid";

  allAnimals.forEach(a => {
    const btn = document.createElement("div");
    btn.className = "animalBtn";
    if (animals.includes(a)) btn.classList.add("active");
    btn.innerText = a;
    btn.onclick = () => {
      animals = animals.includes(a)
        ? animals.filter(x => x !== a)
        : [...animals, a];
      openAnimalPopup();
    };
    grid.appendChild(btn);
  });

  body.appendChild(grid);

popupClose.style.display = "block";
  popupClose.onclick = closePopupOnly

 showPopupOk(closeAnimalPopup);
  document.getElementById("overlay").style.display = "flex";
}

function hidePopupOk() {
  popupOk.style.display = "none";
}
function showPopupOk(handler) {
  popupOk.style.display = "block";
  popupOk.onclick = handler;
}
function closePopupOnly() {
document.getElementById("overlay").style.display = "none";
}

function closeAnimalPopup() {
  document.getElementById("overlay").style.display = "none";
init();
}

function closeEndPopup() {
  document.getElementById("overlay").style.display = "none";
gameMedals = 0;
init();
}

function renderBoard() {
  boardDiv.innerHTML = "";
  board.forEach((_, i) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.onclick = () => place(i);
    boardDiv.appendChild(cell);
  });
}

/* ===== 残数計算の要 ===== */
function getRemainingCards() {
  const list = [...deck];
  if (currentCard) list.push(currentCard);
  return list;
}

function updateCardDetail() {
  const remain = getRemainingCards();
  const d = document.getElementById("cardDetail");
  d.innerHTML = "";
    animals.forEach(a => {
    const body = remain.filter(c => c.animal === a && c.type === "BODY").length;
    const foot = remain.filter(c => c.animal === a && c.type === "FOOT").length;
    const row = document.createElement("div");
    row.className = "cardRow";
    const b = document.createElement("span");
    b.className = "cardItem";
    b.innerText = `${a} ×${body}`;
    if (body === 0) b.classList.add("zero");
    const f = document.createElement("span");
    f.className = "cardItem";
    f.innerText = `${a}🐾 ×${foot}`;
    if (foot === 0) f.classList.add("zero");
    row.appendChild(b);
    row.appendChild(f);
    d.appendChild(row);
  });

  const joker = remain.filter(c => c.type === "JOKER").length;
  const jr = document.createElement("div");
  jr.className = "cardRow";

  const j = document.createElement("span");
  j.className = "cardItem";
  j.innerText = `🃏 ×${joker}`;
  if (joker === 0) j.classList.add("zero");

  jr.appendChild(j);
  d.appendChild(jr);
}

function renderDeck() {
  const remain = getRemainingCards();
document.getElementById("count").innerText = remain.length;
  updateCardDetail();

  if (!currentCard) document.getElementById("deck").innerText = "";
  else if (currentCard.type === "JOKER") document.getElementById("deck").innerText = "🃏";
  else if (currentCard.type === "FOOT") document.getElementById("deck").innerText = currentCard.animal + "🐾";
  else document.getElementById("deck").innerText = currentCard.animal;
}

function draw() {
  currentCard = deck.shift() || null;
  renderDeck();
  setTimeout(autoPlayTurn, AUTO_SPEED_MS[autoSpeed]);
}

/* === 以下ゲームロジックは rev.1 そのまま === */

function neighbors(i) {
  return [
    ...(i % 3 !== 0 ? [i - 1] : []),
    ...(i % 3 !== 2 ? [i + 1] : []),
    ...(i >= 3 ? [i - 3] : []),
    ...(i < 6 ? [i + 3] : [])
  ];
}

function place(i) {
  if (gameEnded || !currentCard || board[i]) return;

  board[i] = currentCard;
  boardDiv.children[i].innerText = document.getElementById("deck").innerText;
  currentCard = null;

  renderDeck();
  checkPair(i);
  checkLine();

  if (deck.length === 0 && !currentCard) {
    endGame("clear");
    return;
  }

  draw();

  if (!board.includes(null) && currentCard) {
    endGame("gameover");
  }
}

function addPoint(cells, ring) {
  score++;
  document.getElementById("score").innerText = score;

  cells.forEach(c => {
    c.classList.add("hit");
    setTimeout(() => c.classList.remove("hit"), 600);

    if (ring) {
      const r = c.getBoundingClientRect();
      const e = document.createElement("div");
      e.className = "ring";
      e.style.left = r.left + r.width / 2 + "px";
      e.style.top = r.top + r.height / 2 + "px";
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 400);
    }
  });
}

function checkPair(i) {
  const c = board[i];
  if (!c || c.type === "JOKER") return;

  neighbors(i).forEach(n => {
    const o = board[n];
    if (o && o.animal === c.animal && o.type !== c.type) {
      const targets = new Set([i, n]);

      [...neighbors(i), ...neighbors(n)].forEach(x => {
        if (board[x]?.type === "JOKER") targets.add(x);
      });

      addPoint([boardDiv.children[i], boardDiv.children[n]], true);

      targets.forEach(t => {
        board[t] = null;
        const cell = boardDiv.children[t];
        cell.classList.add("remove");
        setTimeout(() => {
          cell.classList.remove("remove");
          cell.innerText = "";
        }, 300);
      });
    }
  });
}

function checkLine() {
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8]
  ];

  lines.forEach((l, idx) => {
    if (
      l.every(i => board[i]) &&
      board[l[0]].animal === board[l[1]].animal &&
      board[l[1]].animal === board[l[2]].animal &&
      board[l[0]].type === board[l[1]].type &&
      board[l[1]].type === board[l[2]].type &&
      !scoredLines.has(idx)
    ) {
      scoredLines.add(idx);
      addPoint(l.map(i => boardDiv.children[i]), false);
    }
  });
}

function endGame(type) {
  if (gameEnded) return;
  gameEnded = true;
  historyCount++;
  const li = document.createElement("li");
  const clear = score >= 15 ? " クリア!!" : "";
  li.innerText = `${historyCount}回目：${score}pt${clear}`;
 document.getElementById("log").prepend(li);
if (score >= 15) {
  gameMedals = calcMedals(score);
// ===== Auto中はダブルアップしない =====
  if (autoPlayEnabled) {
    totalMedals += gameMedals;
    gameMedals = 0;
document.getElementById("totalMedals").innerText = totalMedals;
    // 少し待って次ゲーム（演出用）
    setTimeout(() => {
      init();
    }, 800);
  } else {
    showEndPopupWithDoubleUp(type);
  }
} else {
  // 15pt未満でも Auto中は止めない
  if (autoPlayEnabled) {
    setTimeout(() => {
      init();
    }, 800);
  } else {
    showNormalEndPopup(type);
  }
}

}

function showNormalEndPopup(type) {
  if (type === "clear") {
    showPopup("CLEAR!", "山札を使い切りました");
  } else {
    showPopup("Game Over", "これ以上置けません");
  }
}

function showPopup(t, m) {
  document.getElementById("popupTitle").innerText = t;
  document.getElementById("popupBody").innerText = m;

 showPopupOk(closeEndPopup);
  document.getElementById("overlay").style.display = "flex";
}

function showEndPopupWithDoubleUp(type) {
  hidePopupOk();
  popupClose.style.display = "none";

const popupBody = document.getElementById("popupBody");
  const overlay = document.getElementById("overlay");

  const medals = calcMedals(score);

  let msg =
    (type === "clear"
      ? "山札を使い切りました<br><br>"
      : "これ以上置けません<br><br>") +
    `獲得メダル：🪙 ×${medals}`;

popupBody.innerHTML = `
  <p>${msg}</p>

  <div class="doubleUpChoice">
    <button class="btnMain" onclick="startDoubleUp(${medals})">
      ダブルアップに挑戦
    </button>
    <button class="btnSub" onclick="closeEndPopupWithMedals()">
      やめる
    </button>
  </div>
`;
  document.getElementById("popupTitle").innerText =
    type === "clear" ? "CLEAR!" : "Game Over";

  overlay.style.display = "flex";
}

function closeEndPopupWithMedals() {
  totalMedals += gameMedals;
  gameMedals = 0;
  document.getElementById("totalMedals").innerText = totalMedals;
  document.getElementById("overlay").style.display = "none";
  init();
}

function startDoubleUp(medals) {
  gameMedals = medals;
  isDoubleUpPlaying = true;
  showDoubleUpPopup();
}

function showDoubleUpPopup() {
  doubleUpWinRate = Math.random() < 0.5 ? 1 / 3 : 2 / 3;
  hidePopupOk();
  popupClose.style.display = "none";
  const body = document.getElementById("popupBody");
  body.innerHTML = `
    <p>現在のメダル：<strong>${gameMedals}</strong></p>
    <p>カードを1枚選んでください</p>
    <div id="doubleCards" style="display:flex;justify-content:space-around;font-size:32px;margin:16px 0;">
      <div class="duCard">🂠</div>
      <div class="duCard">🂠</div>
      <div class="duCard">🂠</div>
    </div>
  `;
document.querySelectorAll(".duCard").forEach(card => {
  card.onclick = () => pickDoubleUp(card);
}); 
document.getElementById("popupTitle").innerText = "ダブルアップ";
document.getElementById("overlay").style.display = "flex";
}

function pickDoubleUp(clickedCard) {
  if (!isDoubleUpPlaying) return;
  isDoubleUpPlaying = false;
  const cards = Array.from(document.querySelectorAll(".duCard"));
  const clickedIndex = cards.indexOf(clickedCard);
  // === 今回の当たり率（すでに1/3 or 2/3が入っている前提） ===
  const angelCount = doubleUpWinRate === 2/3 ? 2 : 1;
  // === 結果配列を作る（必ず1 or 2枚当たり） ===
  const results = Array(angelCount).fill(true)
    .concat(Array(3 - angelCount).fill(false));
  // シャッフル
  results.sort(() => Math.random() - 0.5);
  const isWin = results[clickedIndex];
  // === クリックカード即オープン ===
  cards[clickedIndex].classList.add("selected");
  cards[clickedIndex].innerText = isWin ? "👼" : "💀";
  // === 残りを遅れてオープン ===
  setTimeout(() => {
    cards.forEach((card, i) => {
      if (i !== clickedIndex) {
        card.innerText = results[i] ? "👼" : "💀";
      }
    });
  }, 500);

  // === 結果処理 ===
  setTimeout(() => {
    if (isWin) {
      gameMedals *= 2;
      showDoubleUpSuccess();
    } else {
      gameMedals = 0;
      endDoubleUp();
    }
  }, 2000);
}

function showDoubleUpSuccess() {
  hidePopupOk();
  popupClose.style.display = "none";
  const body = document.getElementById("popupBody");
  body.innerHTML = `
    <p>成功！</p>
    <p>メダル：<strong>${gameMedals}</strong></p>
    <div class="popupBtnRow">
      <button class="btnMain" onclick="continueDoubleUp()">もう一度</button>
      <button class="btnSub" onclick="endDoubleUp()">やめる</button>
    </div>
  `;

}

function continueDoubleUp() {
  isDoubleUpPlaying = true;
  showDoubleUpPopup();
}

function endDoubleUp() {
  totalMedals += gameMedals;
  gameMedals = 0;

  document.getElementById("totalMedals").innerText = totalMedals;
  document.getElementById("overlay").style.display = "none";
init();
}

function restartGame() {
  historyCount++;
  const li = document.createElement("li");
  li.innerText = `${historyCount}回目：${score}pt`;
  document.getElementById("log").prepend(li);
  init();
}

function calcMedals(score) {
  if (score < 15) return 0;
  if (score === 15) return 1;
  return (score - 15) * 2;
}





/*ここから下がAutoPLAY用のプログラム*/







function toggleAuto() {
  autoPlayEnabled = !autoPlayEnabled;
  const btn = document.getElementById("autoBtn");
  btn.classList.toggle("on", autoPlayEnabled);
  btn.innerText = autoPlayEnabled ? "🤖 AUTO : ON" : "🤖 AUTO : OFF";
  if (autoPlayEnabled) {
    autoPlayTurn();
  }
}

function evaluateImmediateScore(index, card) {
  let gain = 0;
  // 仮置き
  board[index] = card;
  // === ペア評価 ===
  neighbors(index).forEach(n => {
    const o = board[n];
    if (!o || o.type === "JOKER" || card.type === "JOKER") return;
    if (o.animal === card.animal && o.type !== card.type) {
      gain += 100; // ペアは最優先
    }
  });
  // === ライン評価 ===
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8]
  ];
  lines.forEach(l => {
    if (!l.includes(index)) return;
    if (
      l.every(i =>
        board[i] &&
        board[i].animal === card.animal &&
        board[i].type === card.type
      )
    ) {
      gain += 60;
    }
  });
  board[index] = null;
  return gain;
}

function positionalPenalty(index) {
  let p = 0;
  const near = neighbors(index).filter(n => board[n]).length;
  if (near >= 3) p += 20;
  if ([0,2,6,8].includes(index)) p += 5;
  return p;
}

function quickFutureEstimate(index, trials = 5) {
  let total = 0;
  for (let t = 0; t < trials; t++) {
    const state = cloneState();
    state.board[index] = {...currentCard};
    total += state.deck.length; // 詰みにくい方が良い
  }
  return total;
}

function autoPlayTurn() {
  if (!autoPlayEnabled || !currentCard || gameEnded) return;
  autoEvalRaw = Array(9).fill(null);
  let bestScore = -Infinity;
  let bestIndex = null;
  for (let i = 0; i < 9; i++) {
    if (board[i]) continue;
    const raw =
      evaluateImmediateScore(i, currentCard)
      - positionalPenalty(i)
      + quickFutureEstimate(i) * 0.5
      + monteCarloEvaluate(i, 30);
    autoEvalRaw[i] = raw;
    if (raw > bestScore) {
      bestScore = raw;
      bestIndex = i;
    }
  }
  renderAutoEval();   // ★ 追加
  if (bestIndex !== null) {
    place(bestIndex);
  }
}

function hasFutureMove() {
  return board.some(c => c === null);
}

function remainingCount(card) {
  return getRemainingCards().filter(c =>
    c.animal === card.animal &&
    c.type === card.type
  ).length;
}

function cloneState() {
  return {
    board: board.map(c => c ? {...c} : null),
    deck: deck.map(c => ({...c})),
    score: score
  };
}

function playRandomGame(state) {
  let b = state.board;
  let d = state.deck.slice();
  let s = state.score;
  while (d.length > 0) {
    const card = d.shift();
    const empties = b
      .map((v,i) => v === null ? i : null)
      .filter(v => v !== null);
    if (empties.length === 0) break;
    const i = empties[Math.floor(Math.random() * empties.length)];
    b[i] = card;
  }
  return s;
}

function quickEval(state, index, card) {
  let value = 0;
  state.board[index] = card;
  neighborsOf(index).forEach(n => {
    const o = state.board[n];
    if (o && o.animal === card.animal && o.type !== card.type) {
      value += 3;
    }
  });
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8]
  ];
  lines.forEach(l => {
    if (l.includes(index)) {
      const filled = l.filter(i => state.board[i]).length;
      if (filled === 2) value += 1;
    }
  });
  state.board[index] = null;
  return value;
}

function monteCarloEvaluate(index, trials = 50) {
  let wins = 0;
  for (let t = 0; t < trials; t++) {
    const state = {
      board: board.map(c => c ? {...c} : null),
      deck: getRemainingCards().map(c => ({...c})),
      score: score,
      scoredLines: new Set(scoredLines)
    };
    statePlace(state, index, {...currentCard});
    const finalScore = simulateGame(state);
    if (finalScore >= 15) wins++;
  }
  return (wins / trials) * 1000; // 他評価とスケール合わせ
}

function neighborsOf(i) {
  return [
    ...(i % 3 !== 0 ? [i - 1] : []),
    ...(i % 3 !== 2 ? [i + 1] : []),
    ...(i >= 3 ? [i - 3] : []),
    ...(i < 6 ? [i + 3] : [])
  ];
}

function stateCheckPair(state, i) {
  const c = state.board[i];
  if (!c || c.type === "JOKER") return;
  neighborsOf(i).forEach(n => {
    const o = state.board[n];
    if (!o || o.type === "JOKER") return;
    if (o.animal === c.animal && o.type !== c.type) {
      const targets = new Set([i, n]);
[...neighborsOf(i), ...neighborsOf(n)].forEach(x => {
        if (state.board[x]?.type === "JOKER") {
          targets.add(x);
        }
      });
      state.score++;
      targets.forEach(t => {
        state.board[t] = null;
      });
    }
  });
}

function stateCheckLine(state) {
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8]
  ];
  lines.forEach((l, idx) => {
    if (state.scoredLines.has(idx)) return;
    if (
      l.every(i => state.board[i]) &&
      state.board[l[0]].animal === state.board[l[1]].animal &&
      state.board[l[1]].animal === state.board[l[2]].animal &&
      state.board[l[0]].type === state.board[l[1]].type &&
      state.board[l[1]].type === state.board[l[2]].type
    ) {
      state.scoredLines.add(idx);
      state.score++;
    }
  });
}

function statePlace(state, index, card) {
  if (state.board[index]) return false;
  state.board[index] = card;
  stateCheckPair(state, index);
  stateCheckLine(state);
  return true;
}

function simulateGame(initialState) {
  const state = {
    board: initialState.board.map(c => c ? {...c} : null),
    deck: initialState.deck.map(c => ({...c})),
    score: initialState.score,
    scoredLines: new Set(initialState.scoredLines)
  };
  while (state.deck.length > 0) {
    const card = state.deck.shift();
    const empties = state.board
      .map((v,i) => v === null ? i : null)
      .filter(v => v !== null);
    if (empties.length === 0) break;
    // ★良い手を優先して選ぶ
    const scored = empties.map(i => ({
      i,
      w: quickEval(state, i, card)
    }));
    const max = Math.max(...scored.map(x => x.w));
    const best = scored.filter(x => x.w === max);
    const choice = best[Math.floor(Math.random() * best.length)].i;
    statePlace(state, choice, card);
  }
  return state.score;
}

function renderAutoEval() {
  const values = autoEvalRaw.filter(v => v !== null);
  if (values.length === 0) return;
  const min = Math.min(...values);
  const max = Math.max(...values);
  for (let i = 0; i < 9; i++) {
    const cell = boardDiv.children[i];
    const v = autoEvalRaw[i];
    cell.classList.remove("evalCell");
 cell.querySelector(".evalPercent")?.remove();
    if (v === null || board[i]) continue;
    const percent = max === min
      ? 100
      : Math.round((v - min) / (max - min) * 100);
    cell.classList.add("evalCell");
    const label = document.createElement("div");
    label.className = "evalPercent";
    label.innerText = percent + "%";
    cell.appendChild(label);
  }
}

function setAutoSpeed(speed) {
  autoSpeed = speed;
  document
    .querySelectorAll("#autoSpeed button")
    .forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
}


init();
document.getElementById("totalMedals").innerText = totalMedals;

</script>
